spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: logistic-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/transportistas/**,/api/ordenes-despacho/**,/api/traslados/**,/api/envios/**
        
        - id: supplier-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/proveedores/**,/api/evaluaciones/**,/api/recepciones/**,/api/solicitudes-reposicion/**
        
        - id: actuator
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,gateway